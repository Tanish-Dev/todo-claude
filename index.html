<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Things</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:       #0d0d10;
      --card:     #1a1a1f;
      --card2:    #22222a;
      --border:   rgba(255,255,255,0.07);
      --text:     #f5f5f7;
      --text-mid: rgba(255,255,255,0.5);
      --text-soft:rgba(255,255,255,0.28);
      --accent:   #2563eb;
      --accent-2: #1e3a8a;
      --p-high:   #22c55e;
      --p-high-bg:rgba(34,197,94,0.14);
      --p-med:    #f59e0b;
      --p-med-bg: rgba(245,158,11,0.14);
      --p-low:    rgba(255,255,255,0.45);
      --p-low-bg: rgba(255,255,255,0.07);
      --nav-bg:   #111116;
      --ls: -0.05em;
    }

    [data-theme="light"] {
      --bg:       #f2f2f7;
      --card:     #ffffff;
      --card2:    #f0f0f5;
      --border:   rgba(0,0,0,0.07);
      --text:     #0d0d10;
      --text-mid: rgba(0,0,0,0.48);
      --text-soft:rgba(0,0,0,0.3);
      --nav-bg:   #ffffff;
      --p-low:    rgba(0,0,0,0.38);
      --p-low-bg: rgba(0,0,0,0.05);
    }

    html, body { height: 100%; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Segoe UI', system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      letter-spacing: var(--ls);
      min-height: 100dvh;
      display: flex;
      justify-content: center;
      overflow-x: hidden;
      transition: background 0.3s, color 0.3s;
    }

    .app {
      width: 100%;
      max-width: 430px;
      min-height: 100dvh;
      position: relative;
      display: flex;
      flex-direction: column;
    }

    /* ── Views ── */
    .view { display: none; flex-direction: column; flex: 1; }
    .view.active { display: flex; }

    .scroll-area {
      flex: 1;
      overflow-y: auto;
      padding-bottom: calc(110px + env(safe-area-inset-bottom, 0px));
    }
    .scroll-area::-webkit-scrollbar { display: none; }

    /* ── Home header ── */
    .home-top {
      padding: calc(54px + env(safe-area-inset-top, 0px)) 22px 0;
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      margin-bottom: 20px;
    }

    .greeting { font-size: 13px; color: var(--text-mid); margin-bottom: 5px; }
    .greeting-name { font-size: 28px; font-weight: 500; letter-spacing: -0.06em; line-height: 1.05; }

    .top-actions { display: flex; gap: 9px; align-items: center; margin-top: 4px; }

    .icon-btn {
      width: 36px; height: 36px;
      border-radius: 50%;
      background: var(--card);
      border: 1px solid var(--border);
      display: flex; align-items: center; justify-content: center;
      cursor: pointer; color: var(--text-mid);
      transition: background 0.15s, color 0.15s;
      flex-shrink: 0;
    }
    .icon-btn:hover { background: var(--card2); color: var(--text); }
    .icon-btn svg { width: 16px; height: 16px; stroke: currentColor; fill: none; stroke-width: 1.8; }

    /* ── Search ── */
    .search-wrap {
      margin: 0 22px 26px;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 13px;
      padding: 12px 14px;
      display: flex; align-items: center; gap: 10px;
    }
    .search-wrap svg { width: 15px; height: 15px; stroke: var(--text-soft); fill: none; stroke-width: 1.8; flex-shrink: 0; }
    .search-wrap input {
      flex: 1; background: none; border: none; outline: none;
      font-size: 14px; font-family: inherit; letter-spacing: var(--ls);
      color: var(--text); caret-color: var(--accent);
    }
    .search-wrap input::placeholder { color: var(--text-soft); }

    /* ── Section head ── */
    .section-head {
      display: flex; align-items: center; justify-content: space-between;
      margin-bottom: 14px; padding: 0 22px;
    }
    .section-title { font-size: 18px; font-weight: 500; letter-spacing: -0.05em; }
    .see-all-btn {
      font-size: 13px; color: var(--text-mid); background: none; border: none;
      cursor: pointer; font-family: inherit; letter-spacing: var(--ls);
      transition: color 0.15s;
    }
    .see-all-btn:hover { color: var(--accent); }

    /* ── In-progress scroll ── */
    .progress-scroll {
      display: flex; gap: 12px;
      overflow-x: auto;
      padding: 4px 22px 16px;
      -webkit-overflow-scrolling: touch;
      scroll-snap-type: x mandatory;
      -webkit-overflow-scrolling: touch;
    }
    .progress-scroll::-webkit-scrollbar { display: none; }

    .p-card {
      min-width: 195px; max-width: 195px;
      border-radius: 18px; padding: 18px 16px 14px;
      flex-shrink: 0; scroll-snap-align: start;
      cursor: pointer;
      transition: transform 0.15s;
    }
    .p-card:hover { transform: translateY(-2px); }
    .p-card:nth-child(odd)  { background: var(--accent); }
    .p-card:nth-child(even) { background: #1e40af; }

    .p-card-title { font-size: 15px; font-weight: 500; color: #fff; letter-spacing: -0.04em; margin-bottom: 4px; line-height: 1.3; }
    .p-card-sub   { font-size: 12px; color: rgba(255,255,255,0.6); letter-spacing: var(--ls); margin-bottom: 14px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

    .p-track { width: 100%; height: 4px; background: rgba(255,255,255,0.22); border-radius: 99px; overflow: hidden; margin-bottom: 7px; }
    .p-fill  { height: 100%; background: #fff; border-radius: 99px; transition: width 0.5s cubic-bezier(0.4,0,0.2,1); }
    .p-pct   { font-size: 11px; color: rgba(255,255,255,0.55); letter-spacing: var(--ls); }

    /* ── Task cards ── */
    .tasks-list { padding: 0 22px; display: flex; flex-direction: column; gap: 10px; }

    .t-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 16px;
      cursor: pointer;
      transition: border-color 0.15s, transform 0.12s;
      animation: fadeUp 0.2s ease both;
    }
    .t-card:nth-child(2) { animation-delay: 0.03s; }
    .t-card:nth-child(3) { animation-delay: 0.06s; }
    .t-card:nth-child(n+4) { animation-delay: 0.09s; }

    @keyframes fadeUp { from { opacity:0; transform:translateY(8px); } to { opacity:1; transform:translateY(0); } }

    .t-card:hover { border-color: rgba(255,255,255,0.14); }
    [data-theme="light"] .t-card:hover { border-color: rgba(0,0,0,0.13); }
    .t-card:active { transform: scale(0.99); }

    .t-top { display: flex; align-items: flex-start; justify-content: space-between; margin-bottom: 13px; gap: 8px; }

    .t-title {
      font-size: 16px; font-weight: 500; color: var(--text);
      letter-spacing: -0.04em; line-height: 1.35; flex: 1;
    }
    .t-title.done { text-decoration: line-through; color: var(--text-soft); }

    .t-menu-btn {
      background: none; border: none; cursor: pointer;
      color: var(--text-soft); padding: 2px 6px;
      border-radius: 7px; transition: color 0.15s, background 0.15s;
      line-height: 1; font-size: 18px; letter-spacing: 2px;
      flex-shrink: 0;
    }
    .t-menu-btn:hover { color: var(--text); background: var(--card2); }

    .t-progress { margin-bottom: 11px; }
    .t-track { width: 100%; height: 4px; background: rgba(255,255,255,0.08); border-radius: 99px; overflow: hidden; margin-bottom: 6px; }
    [data-theme="light"] .t-track { background: rgba(0,0,0,0.07); }
    .t-fill { height: 100%; background: var(--accent); border-radius: 99px; transition: width 0.4s cubic-bezier(0.4,0,0.2,1); }
    .t-pct { font-size: 11.5px; color: var(--text-soft); letter-spacing: var(--ls); }

    .t-bottom { display: flex; align-items: center; justify-content: space-between; gap: 8px; flex-wrap: wrap; }
    .t-left  { display: flex; align-items: center; gap: 7px; }
    .t-right { display: flex; align-items: center; gap: 8px; }

    .badge {
      display: inline-flex; align-items: center;
      padding: 4px 11px; border-radius: 99px;
      font-size: 11.5px; font-weight: 500; letter-spacing: var(--ls);
      flex-shrink: 0;
    }
    .badge.high { background: var(--p-high-bg); color: var(--p-high); }
    .badge.med  { background: var(--p-med-bg);  color: var(--p-med);  }
    .badge.low  { background: var(--p-low-bg);  color: var(--p-low);  }

    .t-chip { display: inline-flex; align-items: center; gap: 4px; font-size: 11.5px; color: var(--text-soft); letter-spacing: var(--ls); }
    .t-chip svg { width: 12px; height: 12px; stroke: currentColor; fill: none; stroke-width: 1.6; flex-shrink: 0; }

    /* ── All Tasks header ── */
    .tasks-header {
      padding: calc(52px + env(safe-area-inset-top, 0px)) 22px 18px;
      display: flex; align-items: center; gap: 12px;
    }
    .back-btn {
      width: 34px; height: 34px; border-radius: 50%;
      background: var(--card); border: 1px solid var(--border);
      display: flex; align-items: center; justify-content: center;
      cursor: pointer; color: var(--text); transition: background 0.15s;
      flex-shrink: 0;
    }
    .back-btn:hover { background: var(--card2); }
    .back-btn svg { width: 16px; height: 16px; stroke: currentColor; fill: none; stroke-width: 2; }

    .tasks-page-title { flex: 1; text-align: center; font-size: 17px; font-weight: 500; letter-spacing: -0.04em; }

    .notif-btn {
      width: 34px; height: 34px; border-radius: 50%;
      background: var(--card); border: 1px solid var(--border);
      display: flex; align-items: center; justify-content: center;
      cursor: pointer; color: var(--text-mid); position: relative;
    }
    .notif-btn svg { width: 16px; height: 16px; stroke: currentColor; fill: none; stroke-width: 1.8; }
    .notif-dot {
      position: absolute; top: 7px; right: 7px;
      width: 7px; height: 7px; border-radius: 50%;
      background: #ef4444; border: 1.5px solid var(--bg);
    }

    /* ── Filter chips ── */
    .filter-row {
      display: flex; gap: 8px; padding: 0 22px 20px;
      overflow-x: auto; -webkit-overflow-scrolling: touch;
    }
    .filter-row::-webkit-scrollbar { display: none; }

    .fchip {
      padding: 7px 16px; border-radius: 99px;
      border: 1px solid var(--border); background: var(--card);
      color: var(--text-mid); font-family: inherit;
      font-size: 13.5px; font-weight: 500; letter-spacing: var(--ls);
      cursor: pointer; transition: all 0.15s; flex-shrink: 0; white-space: nowrap;
    }
    .fchip:hover { color: var(--text); }
    .fchip.active { background: var(--accent); border-color: var(--accent); color: #fff; }

    /* ── FAB ── */
    .fab {
      position: fixed;
      bottom: calc(96px + env(safe-area-inset-bottom, 0px));
      right: max(22px, calc(50% - 215px + 22px));
      width: 52px; height: 52px; border-radius: 50%;
      background: var(--accent); border: none;
      cursor: pointer; display: flex; align-items: center; justify-content: center;
      box-shadow: 0 8px 28px rgba(37,99,235,0.45);
      transition: transform 0.15s, box-shadow 0.15s;
      z-index: 50;
    }
    .fab:hover { transform: scale(1.08); box-shadow: 0 12px 36px rgba(37,99,235,0.55); }
    .fab:active { transform: scale(0.94); }
    .fab svg { width: 22px; height: 22px; stroke: #fff; fill: none; stroke-width: 2.5; }

    /* ── Bottom nav island ── */
    .bottom-nav {
      position: fixed;
      bottom: calc(20px + env(safe-area-inset-bottom, 0px));
      left: 50%; transform: translateX(-50%);
      background: rgba(16,16,22,0.88);
      -webkit-backdrop-filter: blur(22px) saturate(1.4);
      backdrop-filter: blur(22px) saturate(1.4);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 999px;
      display: flex; align-items: center;
      padding: 8px;
      gap: 2px;
      z-index: 60;
      box-shadow: 0 8px 36px rgba(0,0,0,0.5), 0 2px 8px rgba(0,0,0,0.3), inset 0 1px 0 rgba(255,255,255,0.07);
    }
    [data-theme="light"] .bottom-nav {
      background: rgba(255,255,255,0.82);
      border-color: rgba(0,0,0,0.1);
      box-shadow: 0 8px 36px rgba(0,0,0,0.14), 0 2px 8px rgba(0,0,0,0.07);
    }

    .nav-tab {
      width: 54px; height: 54px; border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      cursor: pointer; background: none; border: none;
      color: rgba(255,255,255,0.38);
      transition: background 0.2s, color 0.2s;
    }
    .nav-tab.active {
      background: rgba(255,255,255,0.13);
      color: #ffffff;
    }
    [data-theme="light"] .nav-tab { color: rgba(0,0,0,0.36); }
    [data-theme="light"] .nav-tab.active { background: rgba(0,0,0,0.08); color: #0d0d10; }
    .nav-tab svg { width: 22px; height: 22px; stroke: currentColor; fill: none; stroke-width: 1.7; }
    .nav-tab.active svg { stroke-width: 2.1; }

    /* ── Progress slider sheet ── */
    .prog-overlay {
      position: fixed; inset: 0;
      background: rgba(0,0,0,0.55);
      -webkit-backdrop-filter: blur(4px);
      backdrop-filter: blur(4px); /* after -webkit- per spec */
      z-index: 82; display: none; align-items: flex-end; justify-content: center;
    }
    .prog-overlay.open { display: flex; }

    .prog-sheet {
      background: var(--card);
      border-radius: 24px 24px 0 0;
      padding: 20px 24px calc(32px + env(safe-area-inset-bottom, 0px));
      width: 100%; max-width: 430px;
      animation: sheetUp 0.26s cubic-bezier(0.4,0,0.2,1);
    }

    .prog-handle { width: 36px; height: 4px; background: var(--border); border-radius: 99px; margin: 0 auto 22px; }
    .prog-label { font-size: 13px; color: var(--text-soft); letter-spacing: var(--ls); margin-bottom: 4px; }
    .prog-task-name { font-size: 16px; font-weight: 500; letter-spacing: -0.04em; margin-bottom: 24px; color: var(--text); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .prog-pct-display { text-align: center; font-size: 52px; font-weight: 500; letter-spacing: -0.06em; color: var(--accent); line-height: 1; margin-bottom: 4px; }
    .prog-pct-unit { text-align: center; font-size: 13px; color: var(--text-soft); letter-spacing: var(--ls); margin-bottom: 20px; }

    .prog-slider-wrap { position: relative; margin-bottom: 28px; }
    .prog-track-bg {
      width: 100%; height: 6px; border-radius: 99px;
      background: var(--card2); position: relative; overflow: hidden;
    }
    .prog-fill-track {
      position: absolute; top: 0; left: 0; height: 100%;
      background: var(--accent); border-radius: 99px;
      transition: width 0.05s;
      pointer-events: none;
    }

    .prog-range {
      position: absolute; top: 50%; left: 0;
      width: 100%; height: 28px; margin-top: -14px;
      opacity: 0; cursor: pointer; z-index: 2;
      touch-action: none;
    }

    .prog-thumb {
      position: absolute; top: 50%; transform: translateY(-50%);
      width: 28px; height: 28px; border-radius: 50%;
      background: var(--accent);
      box-shadow: 0 2px 12px rgba(37,99,235,0.55);
      pointer-events: none;
      margin-left: -14px;
    }

    .prog-actions { display: flex; gap: 10px; }
    .prog-cancel {
      flex: 1; padding: 14px; border-radius: 13px;
      border: 1px solid var(--border); background: none;
      font-family: inherit; font-size: 15px; font-weight: 500;
      letter-spacing: var(--ls); color: var(--text-mid); cursor: pointer;
      transition: background 0.15s;
    }
    .prog-cancel:hover { background: var(--card2); }
    .prog-save {
      flex: 2; padding: 14px; border-radius: 13px;
      border: none; background: var(--accent);
      font-family: inherit; font-size: 15px; font-weight: 500;
      letter-spacing: var(--ls); color: #fff; cursor: pointer;
      transition: opacity 0.15s;
    }
    .prog-save:hover { opacity: 0.9; }

    /* ── Add task sheet ── */
    .overlay {
      position: fixed; inset: 0;
      background: rgba(0,0,0,0.6); backdrop-filter: blur(6px);
      -webkit-backdrop-filter: blur(6px);
      z-index: 80; display: none; align-items: flex-end; justify-content: center;
    }
    .overlay.open { display: flex; }

    .sheet {
      background: var(--card);
      border-radius: 24px 24px 0 0;
      padding: 20px 22px calc(28px + env(safe-area-inset-bottom, 0px));
      width: 100%; max-width: 430px;
      animation: sheetUp 0.26s cubic-bezier(0.4,0,0.2,1);
    }
    @keyframes sheetUp { from { transform: translateY(100%); } to { transform: translateY(0); } }

    .sheet-handle { width: 36px; height: 4px; background: var(--border); border-radius: 99px; margin: 0 auto 20px; }

    .sheet-title { font-size: 17px; font-weight: 500; letter-spacing: -0.05em; margin-bottom: 16px; }

    .sheet-input {
      width: 100%; background: var(--card2); border: 1px solid var(--border);
      border-radius: 13px; padding: 13px 15px;
      font-size: 15px; font-family: inherit; letter-spacing: var(--ls);
      color: var(--text); outline: none; caret-color: var(--accent);
      margin-bottom: 12px; transition: border-color 0.15s;
    }
    .sheet-input:focus { border-color: rgba(37,99,235,0.45); }
    .sheet-input::placeholder { color: var(--text-soft); }

    .priority-row { display: flex; gap: 8px; margin-bottom: 16px; }

    .p-opt {
      flex: 1; padding: 9px 6px; border-radius: 11px; border: 1.5px solid var(--border);
      background: none; font-family: inherit; font-size: 12.5px; font-weight: 500;
      letter-spacing: var(--ls); cursor: pointer; text-align: center;
      color: var(--text-mid); transition: all 0.15s;
    }
    .p-opt.active-high { border-color: var(--p-high); background: var(--p-high-bg); color: var(--p-high); }
    .p-opt.active-med  { border-color: var(--p-med);  background: var(--p-med-bg);  color: var(--p-med); }
    .p-opt.active-low  { border-color: rgba(255,255,255,0.25); background: var(--p-low-bg); color: var(--text-mid); }

    .sheet-submit {
      width: 100%; background: var(--accent); color: #fff; border: none;
      border-radius: 14px; padding: 15px; font-family: inherit;
      font-size: 15px; font-weight: 500; letter-spacing: var(--ls);
      cursor: pointer; transition: opacity 0.15s, transform 0.12s;
    }
    .sheet-submit:hover { opacity: 0.9; }
    .sheet-submit:active { transform: scale(0.98); }

    /* ── Context menu ── */
    .ctx-menu {
      position: fixed; background: var(--card2);
      border: 1px solid var(--border); border-radius: 15px;
      padding: 6px; z-index: 75; min-width: 168px;
      box-shadow: 0 16px 48px rgba(0,0,0,0.45);
      display: none;
    }
    .ctx-menu.open { display: block; }

    .ctx-item {
      display: flex; align-items: center; gap: 10px;
      padding: 10px 13px; border-radius: 10px;
      cursor: pointer; font-size: 14px; color: var(--text);
      letter-spacing: var(--ls); background: none; border: none;
      width: 100%; text-align: left; font-family: inherit;
      transition: background 0.12s;
    }
    .ctx-item:hover { background: var(--border); }
    .ctx-item.danger { color: #f87171; }
    .ctx-item svg { width: 14px; height: 14px; stroke: currentColor; fill: none; stroke-width: 1.8; flex-shrink: 0; }

    /* ── Empty ── */
    .empty { text-align: center; padding: 60px 20px; }
    .empty-ico { display: flex; align-items: center; justify-content: center; margin-bottom: 12px; opacity: 0.3; }
    .empty-ico svg { width: 40px; height: 40px; stroke: var(--text-mid); fill: none; stroke-width: 1.4; }
    .empty-lbl { font-size: 15px; color: var(--text-mid); letter-spacing: var(--ls); margin-bottom: 5px; }
    .empty-sub { font-size: 13px; color: var(--text-soft); letter-spacing: var(--ls); }

    /* ── Theme icons ── */
    .icon-moon { display: block; }
    .icon-sun  { display: none; }
    [data-theme="light"] .icon-moon { display: none; }
    [data-theme="light"] .icon-sun  { display: block; }
  </style>
</head>
<body>
<div class="app">

  <!-- ════ HOME VIEW ════ -->
  <div class="view active" id="view-home">
    <div class="home-top">
      <div>
        <div class="greeting" id="greeting">Good Morning</div>
        <div class="greeting-name">Your Tasks</div>
      </div>
      <div class="top-actions">
        <button class="icon-btn" id="theme-toggle" aria-label="Toggle theme" type="button">
          <svg class="icon-moon" viewBox="0 0 24 24"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
          <svg class="icon-sun" viewBox="0 0 24 24"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>
        </button>
      </div>
    </div>

    <div class="search-wrap">
      <svg viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
      <input id="home-search" type="text" placeholder="Search Task here…" autocomplete="off" spellcheck="false" />
    </div>

    <div class="scroll-area">
      <!-- In Progress -->
      <div style="margin-bottom:26px">
        <div class="section-head">
          <span class="section-title" id="in-prog-label">In Progress</span>
        </div>
        <div class="progress-scroll" id="in-prog-list">
          <div class="empty" style="padding:20px 0;min-width:200px">
            <div class="empty-sub">No active tasks</div>
          </div>
        </div>
      </div>

      <!-- Today -->
      <div>
        <div class="section-head">
          <span class="section-title">Today Task</span>
          <button class="see-all-btn" id="see-all-btn" type="button">See All</button>
        </div>
        <div class="tasks-list" id="today-list"></div>
      </div>
    </div>
  </div>

  <!-- ════ ALL TASKS VIEW ════ -->
  <div class="view" id="view-tasks">
    <div class="tasks-header">
      <button class="back-btn" id="back-btn" type="button">
        <svg viewBox="0 0 24 24"><line x1="19" y1="12" x2="5" y2="12"/><polyline points="12 19 5 12 12 5"/></svg>
      </button>
      <div class="tasks-page-title">All Tasks</div>
      <div class="notif-btn">
        <svg viewBox="0 0 24 24"><path d="M18 8A6 6 0 006 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 01-3.46 0"/></svg>
        <div class="notif-dot"></div>
      </div>
    </div>

    <div class="search-wrap" style="margin:0 22px 16px">
      <svg viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
      <input id="tasks-search" type="text" placeholder="Search Task here…" autocomplete="off" spellcheck="false" />
    </div>

    <div class="filter-row" id="filter-row">
      <button class="fchip active" data-f="all" type="button">All</button>
      <button class="fchip" data-f="high" type="button">High</button>
      <button class="fchip" data-f="med" type="button">Medium</button>
      <button class="fchip" data-f="low" type="button">Low</button>
      <button class="fchip" data-f="done" type="button">Done</button>
    </div>

    <div class="scroll-area">
      <div class="tasks-list" id="all-list"></div>
    </div>
  </div>

  <!-- ════ FAB ════ -->
  <button class="fab" id="fab" type="button" aria-label="Add task">
    <svg viewBox="0 0 24 24"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
  </button>

  <!-- ════ BOTTOM NAV island ════ -->
  <nav class="bottom-nav">
    <button class="nav-tab active" data-nav="home" type="button" aria-label="Home">
      <svg viewBox="0 0 24 24"><path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
    </button>
    <button class="nav-tab" data-nav="tasks" type="button" aria-label="Tasks">
      <svg viewBox="0 0 24 24"><line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/><line x1="3" y1="6" x2="3.01" y2="6"/><line x1="3" y1="12" x2="3.01" y2="12"/><line x1="3" y1="18" x2="3.01" y2="18"/></svg>
    </button>
    <button class="nav-tab" type="button" aria-label="Calendar">
      <svg viewBox="0 0 24 24"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
    </button>
    <button class="nav-tab" type="button" aria-label="Profile">
      <svg viewBox="0 0 24 24"><path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
    </button>
  </nav>

  <!-- ════ ADD TASK SHEET ════ -->
  <div class="overlay" id="overlay">
    <div class="sheet">
      <div class="sheet-handle"></div>
      <div class="sheet-title">New Task</div>
      <input class="sheet-input" id="task-input" type="text" placeholder="What needs to get done?" autocomplete="off" spellcheck="false" maxlength="200" enterkeyhint="done" />
      <div class="priority-row">
        <button class="p-opt" data-p="3" type="button">High</button>
        <button class="p-opt" data-p="2" type="button">Medium</button>
        <button class="p-opt active-low" data-p="1" type="button">Low</button>
      </div>
      <button class="sheet-submit" id="sheet-submit" type="button">Add Task</button>
    </div>
  </div>

  <!-- ════ PROGRESS SLIDER SHEET ════ -->
  <div class="prog-overlay" id="prog-overlay">
    <div class="prog-sheet">
      <div class="prog-handle"></div>
      <div class="prog-label">Update Progress</div>
      <div class="prog-task-name" id="prog-task-name"></div>
      <div class="prog-pct-display" id="prog-pct-display">0</div>
      <div class="prog-pct-unit">percent complete</div>
      <div class="prog-slider-wrap">
        <div class="prog-track-bg">
          <div class="prog-fill-track" id="prog-fill-track"></div>
        </div>
        <input class="prog-range" id="prog-range" type="range" min="0" max="100" value="0" />
        <div class="prog-thumb" id="prog-thumb"></div>
      </div>
      <div class="prog-actions">
        <button class="prog-cancel" id="prog-cancel" type="button">Cancel</button>
        <button class="prog-save" id="prog-save" type="button">Save Progress</button>
      </div>
    </div>
  </div>

  <!-- ════ CONTEXT MENU ════ -->
  <div class="ctx-menu" id="ctx-menu">
    <button class="ctx-item" id="ctx-done" type="button">
      <svg viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"/></svg>
      Mark complete
    </button>
    <button class="ctx-item" id="ctx-progress" type="button">
      <svg viewBox="0 0 24 24"><line x1="12" y1="20" x2="12" y2="4"/><polyline points="6 10 12 4 18 10"/></svg>
      Set progress
    </button>
    <button class="ctx-item danger" id="ctx-delete" type="button">
      <svg viewBox="0 0 24 24"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 01-2 2H8a2 2 0 01-2-2L5 6"/><path d="M10 11v6"/><path d="M14 11v6"/></svg>
      Delete
    </button>
  </div>

</div>

<script>
  const STORE = 'things_v3';
  const THEME_KEY = 'things_theme';

  // ── State ──
  let todos = JSON.parse(localStorage.getItem(STORE) || '[]');
  let filter = 'all';
  let search = { home: '', tasks: '' };
  let activeId = null;
  let selectedPriority = 1;

  // ── Theme ──
  const html = document.documentElement;
  const saved = localStorage.getItem(THEME_KEY);
  const sysDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
  html.setAttribute('data-theme', saved || (sysDark ? 'dark' : 'light'));

  document.getElementById('theme-toggle').addEventListener('click', () => {
    const next = html.getAttribute('data-theme') === 'dark' ? 'light' : 'dark';
    html.setAttribute('data-theme', next);
    localStorage.setItem(THEME_KEY, next);
  });

  // ── Greeting ──
  function setGreeting() {
    const h = new Date().getHours();
    const g = h < 12 ? 'Good Morning' : h < 17 ? 'Good Afternoon' : 'Good Evening';
    document.getElementById('greeting').textContent = g;
  }
  setGreeting();

  // ── Save ──
  function save() { localStorage.setItem(STORE, JSON.stringify(todos)); }

  // ── Utils ──
  function esc(s) { return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

  function priorityLabel(p) { return p === 3 ? 'High' : p === 2 ? 'Medium' : 'Low'; }
  function priorityClass(p) { return p === 3 ? 'high' : p === 2 ? 'med' : 'low'; }

  function formatDate(ts) {
    if (!ts) return 'Today';
    const d = new Date(ts);
    const t = new Date();
    if (d.toDateString() === t.toDateString()) return 'Today';
    return d.toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
  }

  function formatTime(ts) {
    if (!ts) return '';
    return new Date(ts).toLocaleTimeString('en-US', { hour: 'numeric', minute: '2-digit' });
  }

  // ── Render task card ──
  function taskCard(todo, opts = {}) {
    const pClass = priorityClass(todo.priority || 1);
    const pLabel = priorityLabel(todo.priority || 1);
    const pct    = todo.done ? 100 : (todo.progress || 0);
    const search = (opts.search || '').toLowerCase();
    const text   = todo.text;
    const titleHtml = search && text.toLowerCase().includes(search)
      ? esc(text).replace(new RegExp(`(${search.replace(/[.*+?^${}()|[\]\\]/g,'\\$&')})`, 'gi'), '<mark style="background:rgba(37,99,235,0.3);color:inherit;border-radius:2px">$1</mark>')
      : esc(text);

    return `
      <div class="t-card" data-id="${todo.id}">
        <div class="t-top">
          <div class="t-title${todo.done ? ' done' : ''}">${titleHtml}</div>
          <button class="t-menu-btn" data-id="${todo.id}" type="button" aria-label="Task options">···</button>
        </div>
        <div class="t-progress">
          <div class="t-track"><div class="t-fill" style="width:${pct}%"></div></div>
          <div class="t-pct">Complete: ${pct}%</div>
        </div>
        <div class="t-bottom">
          <div class="t-left">
            <span class="badge ${pClass}">${pLabel}</span>
          </div>
          <div class="t-right">
            <span class="t-chip">
              <svg viewBox="0 0 24 24"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
              ${formatDate(todo.created)}
            </span>
            <span class="t-chip">
              <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
              ${formatTime(todo.created)}
            </span>
          </div>
        </div>
      </div>
    `;
  }

  // ── Render in-progress card ──
  function progressCard(todo) {
    const pct = todo.done ? 100 : (todo.progress || 0);
    const sub = todo.text.length > 28 ? todo.text.slice(0, 28) + '…' : todo.text;
    return `
      <div class="p-card" data-id="${todo.id}">
        <div class="p-card-title">${esc(todo.text)}</div>
        <div class="p-card-sub">${esc(sub)}</div>
        <div class="p-track"><div class="p-fill" style="width:${pct}%"></div></div>
        <div class="p-pct">Complete: ${pct}%</div>
      </div>
    `;
  }

  // ── Render home ──
  function renderHome() {
    const q = search.home.toLowerCase();
    const active = todos.filter(t => !t.done && (!q || t.text.toLowerCase().includes(q)));
    const all    = todos.filter(t => !q || t.text.toLowerCase().includes(q));

    // In-progress (active tasks)
    const ipEl = document.getElementById('in-prog-list');
    const lbl  = document.getElementById('in-prog-label');
    lbl.textContent = `In Progress (${active.length.toString().padStart(2,'0')})`;

    if (active.length === 0) {
      ipEl.innerHTML = '<div style="min-width:220px;display:flex;align-items:center;gap:8px;padding:12px 0"><svg viewBox="0 0 24 24" style="width:16px;height:16px;stroke:var(--text-soft);fill:none;stroke-width:1.8;flex-shrink:0"><polyline points="20 6 9 17 4 12"/></svg><span style="font-size:13px;color:var(--text-soft)">All caught up</span></div>';
    } else {
      ipEl.innerHTML = active.slice(0, 8).map(progressCard).join('');
    }

    // Today list (show limited in home, undone first)
    const todayEl = document.getElementById('today-list');
    const todayItems = all.slice(0, 5);
    if (todayItems.length === 0) {
      todayEl.innerHTML = `<div class="empty"><div class="empty-ico"><svg viewBox="0 0 24 24"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="12" y1="8" x2="12" y2="16"/><line x1="8" y1="12" x2="16" y2="12"/></svg></div><div class="empty-lbl">Nothing here yet</div><div class="empty-sub">Tap + to add your first task</div></div>`;
    } else {
      todayEl.innerHTML = todayItems.map(t => taskCard(t, { search: q })).join('');
    }
  }

  // ── Render all tasks ──
  function renderAllTasks() {
    const q = search.tasks.toLowerCase();
    let filtered = todos.filter(t => !q || t.text.toLowerCase().includes(q));
    if (filter === 'high') filtered = filtered.filter(t => (t.priority || 1) === 3);
    else if (filter === 'med')  filtered = filtered.filter(t => (t.priority || 1) === 2);
    else if (filter === 'low')  filtered = filtered.filter(t => (t.priority || 1) === 1);
    else if (filter === 'done') filtered = filtered.filter(t => t.done);

    // Update chip counts
    document.querySelector('[data-f="all"]').textContent = `All (${todos.length})`;

    const el = document.getElementById('all-list');
    if (filtered.length === 0) {
      el.innerHTML = `<div class="empty"><div class="empty-ico"><svg viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg></div><div class="empty-lbl">No tasks found</div><div class="empty-sub">${q ? 'Try a different search' : 'Add a task with the + button'}</div></div>`;
    } else {
      el.innerHTML = filtered.map(t => taskCard(t, { search: q })).join('');
    }
  }

  function render() { renderHome(); renderAllTasks(); }

  // ── Navigation ──
  let activeView = 'home';

  function showView(v) {
    activeView = v;
    document.querySelectorAll('.view').forEach(el => el.classList.remove('active'));
    document.getElementById(`view-${v}`).classList.add('active');
    document.querySelectorAll('.nav-tab').forEach(t => {
      t.classList.toggle('active', t.dataset.nav === v);
    });
    render();
  }

  document.querySelectorAll('.nav-tab').forEach(btn => {
    btn.addEventListener('click', () => { if (btn.dataset.nav) showView(btn.dataset.nav); });
  });

  document.getElementById('see-all-btn').addEventListener('click', () => showView('tasks'));
  document.getElementById('back-btn').addEventListener('click', () => showView('home'));

  // ── Filters ──
  document.getElementById('filter-row').addEventListener('click', e => {
    const chip = e.target.closest('.fchip');
    if (!chip) return;
    filter = chip.dataset.f;
    document.querySelectorAll('.fchip').forEach(c => c.classList.remove('active'));
    chip.classList.add('active');
    renderAllTasks();
  });

  // ── Search ──
  document.getElementById('home-search').addEventListener('input', e => {
    search.home = e.target.value;
    renderHome();
  });

  document.getElementById('tasks-search').addEventListener('input', e => {
    search.tasks = e.target.value;
    renderAllTasks();
  });

  // ── Add task sheet ──
  const overlay  = document.getElementById('overlay');
  const taskInput = document.getElementById('task-input');
  const pOpts    = document.querySelectorAll('.p-opt');

  function openSheet() {
    overlay.classList.add('open');
    taskInput.value = '';
    selectedPriority = 1;
    pOpts.forEach(o => { o.className = 'p-opt'; });
    document.querySelector('[data-p="1"]').classList.add('active-low');
    setTimeout(() => taskInput.focus(), 120);
  }

  function closeSheet() { overlay.classList.remove('open'); }

  document.getElementById('fab').addEventListener('click', openSheet);
  overlay.addEventListener('click', e => { if (e.target === overlay) closeSheet(); });

  pOpts.forEach(btn => {
    btn.addEventListener('click', () => {
      const p = parseInt(btn.dataset.p);
      selectedPriority = p;
      pOpts.forEach(o => { o.className = 'p-opt'; });
      if (p === 3) btn.classList.add('active-high');
      else if (p === 2) btn.classList.add('active-med');
      else btn.classList.add('active-low');
    });
  });

  function addTask() {
    const text = taskInput.value.trim();
    if (!text) { taskInput.style.animation='none'; taskInput.offsetHeight; taskInput.style.animation=''; return; }
    todos.unshift({
      id: Date.now(),
      text,
      done: false,
      priority: selectedPriority,
      progress: Math.floor(Math.random() * 45),
      created: Date.now()
    });
    save(); render(); closeSheet();
  }

  document.getElementById('sheet-submit').addEventListener('click', addTask);
  taskInput.addEventListener('keydown', e => { if (e.key === 'Enter') addTask(); });

  // ── Context menu ──
  const ctxMenu = document.getElementById('ctx-menu');
  let ctxId = null;

  function openCtx(id, x, y) {
    ctxId = id;
    const todo = todos.find(t => t.id === id);
    if (!todo) return;
    document.getElementById('ctx-done').innerHTML = todo.done
      ? `<svg viewBox="0 0 24 24" style="width:14px;height:14px;stroke:currentColor;fill:none;stroke-width:1.8"><polyline points="1 4 1 10 7 10"/><path d="M3.51 15a9 9 0 1 0 .49-3.54"/></svg> Mark active`
      : `<svg viewBox="0 0 24 24" style="width:14px;height:14px;stroke:currentColor;fill:none;stroke-width:1.8"><polyline points="20 6 9 17 4 12"/></svg> Mark complete`;

    const viewW = window.innerWidth;
    const menuW = 168;
    let left = Math.min(x, viewW - menuW - 12);
    ctxMenu.style.left = left + 'px';
    ctxMenu.style.top  = Math.min(y, window.innerHeight - 160) + 'px';
    ctxMenu.classList.add('open');
  }

  function closeCtx() { ctxMenu.classList.remove('open'); ctxId = null; }

  document.addEventListener('click', e => {
    const menuBtn = e.target.closest('.t-menu-btn');
    if (menuBtn) {
      e.stopPropagation();
      const id = parseInt(menuBtn.dataset.id);
      const r  = menuBtn.getBoundingClientRect();
      if (ctxId === id && ctxMenu.classList.contains('open')) { closeCtx(); return; }
      openCtx(id, r.left, r.bottom + 6);
      return;
    }
    if (!ctxMenu.contains(e.target)) closeCtx();
  });

  document.getElementById('ctx-done').addEventListener('click', () => {
    const todo = todos.find(t => t.id === ctxId);
    if (todo) { todo.done = !todo.done; if (todo.done) todo.progress = 100; save(); render(); }
    closeCtx();
  });

  document.getElementById('ctx-progress').addEventListener('click', () => {
    const id = ctxId;
    closeCtx();
    openProgressSheet(id);
  });

  document.getElementById('ctx-delete').addEventListener('click', () => {
    todos = todos.filter(t => t.id !== ctxId);
    save(); render(); closeCtx();
  });

  // ── Tap task card → open progress sheet ──
  function handleCardTap(e) {
    if (e.target.closest('.t-menu-btn')) return;
    const card = e.target.closest('.t-card');
    if (!card) return;
    openProgressSheet(parseInt(card.dataset.id));
  }

  document.getElementById('today-list').addEventListener('click', handleCardTap);
  document.getElementById('all-list').addEventListener('click', handleCardTap);
  document.getElementById('in-prog-list').addEventListener('click', e => {
    const card = e.target.closest('.p-card');
    if (!card) return;
    openProgressSheet(parseInt(card.dataset.id));
  });

  // ── Progress slider sheet ──
  const progOverlay  = document.getElementById('prog-overlay');
  const progRange    = document.getElementById('prog-range');
  const progDisplay  = document.getElementById('prog-pct-display');
  const progFill     = document.getElementById('prog-fill-track');
  const progThumb    = document.getElementById('prog-thumb');
  const progTaskName = document.getElementById('prog-task-name');
  let progId = null;

  function updateSliderUI(val) {
    const pct = Math.round(val);
    progDisplay.textContent = pct;
    progFill.style.width = pct + '%';
    progThumb.style.left = pct + '%';
  }

  function openProgressSheet(id) {
    const todo = todos.find(t => t.id === id);
    if (!todo) return;
    progId = id;
    progTaskName.textContent = todo.text;
    const val = todo.done ? 100 : (todo.progress || 0);
    progRange.value = val;
    updateSliderUI(val);
    progOverlay.classList.add('open');
  }

  function closeProgressSheet() { progOverlay.classList.remove('open'); progId = null; }

  progRange.addEventListener('input', () => updateSliderUI(progRange.value));

  document.getElementById('prog-save').addEventListener('click', () => {
    const todo = todos.find(t => t.id === progId);
    if (todo) {
      const n = parseInt(progRange.value);
      todo.progress = n;
      todo.done = n === 100;
      save(); render();
    }
    closeProgressSheet();
  });

  document.getElementById('prog-cancel').addEventListener('click', closeProgressSheet);
  progOverlay.addEventListener('click', e => { if (e.target === progOverlay) closeProgressSheet(); });

  // ── Migrate old data ──
  todos = todos.map(t => ({
    id: t.id || Date.now(),
    text: t.text || '',
    done: t.done || false,
    priority: t.priority || 1,
    progress: t.done ? 100 : (t.progress ?? Math.floor(Math.random() * 50)),
    created: t.created || Date.now()
  }));
  save();

  render();
</script>
</body>
</html>
